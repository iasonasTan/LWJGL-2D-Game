plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

application {
    mainClass="game.Main"
}

run {
    jvmArgs += "--enable-native-access=ALL-UNNAMED"
}

import org.gradle.internal.os.OperatingSystem

def lwjglVersion = "3.3.3"
def lwjglNatives = OperatingSystem.current().isWindows() ? "natives-windows" :
        OperatingSystem.current().isMacOsX() ? "natives-macos" :
                "natives-linux"

dependencies {
    // Core LWJGL
    implementation platform("org.lwjgl:lwjgl-bom:${lwjglVersion}")

    implementation "org.lwjgl:lwjgl"
    implementation "org.lwjgl:lwjgl-glfw"   // window + input
    implementation "org.lwjgl:lwjgl-opengl"  // rendering

    runtimeOnly "org.lwjgl:lwjgl::${lwjglNatives}"
    runtimeOnly "org.lwjgl:lwjgl-glfw::${lwjglNatives}"
    runtimeOnly "org.lwjgl:lwjgl-opengl::${lwjglNatives}"
}
